# Builds Vite to ./dist and pushes that folder to the `gh-pages` branch.
#
# GitHub: Settings → Pages → Build and deployment → Source: "Deploy from a branch"
# Branch: gh-pages  ·  Folder: / (root)
#
# Do NOT publish the repo root (main) — that serves index.html with /index.tsx and breaks in the browser.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # JamesIves v4.8+ runs on Node 24; peaceiris/actions-gh-pages@v4 still used Node 20 (deprecated on runners).
      - name: Publish to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          folder: dist
          branch: gh-pages
          single-commit: true
