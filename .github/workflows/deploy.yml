# Publishes ./dist (Vite build). GitHub repo Settings → Pages → Build and deployment
# must use "GitHub Actions", NOT "Deploy from a branch". Branch deploy serves raw
# index.html (points at /index.tsx) and the app will not load.
#
# Actions pinned to majors that run on Node.js 24 (see GitHub changelog on Node 20 deprecation).
name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # v4 excludes dotfiles by default; include-hidden-files keeps public/.nojekyll in dist.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5