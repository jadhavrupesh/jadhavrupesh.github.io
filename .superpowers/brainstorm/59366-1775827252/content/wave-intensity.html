<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Intensity</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d0d; color: #e5e5e5; font-family: system-ui, sans-serif; padding: 24px; }
  h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 6px; color: #fff; }
  .subtitle { color: #888; font-size: 0.875rem; margin-bottom: 24px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  @media (max-width: 640px) { .cards { grid-template-columns: 1fr; } }
  .card {
    border: 2px solid #222; border-radius: 12px; overflow: hidden;
    cursor: pointer; transition: border-color 0.2s, transform 0.15s; background: #111;
  }
  .card:hover { border-color: #444; transform: translateY(-2px); }
  .card.selected { border-color: #6366f1; }
  .card-preview { width: 100%; height: 180px; position: relative; overflow: hidden; background: #000; }
  canvas { width: 100%; height: 100%; display: block; }
  .card-body { padding: 12px; }
  .card-body h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 3px; color: #fff; }
  .card-body p { font-size: 0.78rem; color: #888; line-height: 1.4; }
</style>
</head>
<body>

<h2>How intense should the waves be?</h2>
<p class="subtitle">Choose how visible the wave motion is behind your content.</p>

<div class="cards">
  <div class="card" data-choice="subtle" onclick="toggleSelect(this)">
    <div class="card-preview">
      <canvas id="c1"></canvas>
    </div>
    <div class="card-body">
      <h3>Subtle</h3>
      <p>Barely-there shimmer. Content always dominates.</p>
    </div>
  </div>

  <div class="card" data-choice="medium" onclick="toggleSelect(this)">
    <div class="card-preview">
      <canvas id="c2"></canvas>
    </div>
    <div class="card-body">
      <h3>Medium</h3>
      <p>Clearly visible waves, still dark and moody.</p>
    </div>
  </div>

  <div class="card" data-choice="bold" onclick="toggleSelect(this)">
    <div class="card-preview">
      <canvas id="c3"></canvas>
    </div>
    <div class="card-body">
      <h3>Bold</h3>
      <p>High-contrast waves — dramatic, eye-catching.</p>
    </div>
  </div>
</div>

<script>
function toggleSelect(el) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  if (window.__sp_select) window.__sp_select(el.dataset.choice, el.querySelector('h3').textContent);
}

function makeWave(id, brightness, speed, freq) {
  const canvas = document.getElementById(id);
  const p = canvas.parentElement;
  canvas.width = p.offsetWidth || 260;
  canvas.height = 180;
  const ctx = canvas.getContext('2d');
  let t = 0;
  function draw() {
    const w = canvas.width, h = canvas.height;
    const img = ctx.createImageData(w, h);
    const d = img.data;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const nx = x / w, ny = y / h;
        const v = Math.sin(nx * freq + t) * Math.cos(ny * (freq * 0.6) + t * 0.7) * 0.5 + 0.5;
        const bv = v * brightness + 5;
        const i = (y * w + x) * 4;
        d[i] = d[i+1] = d[i+2] = bv;
        d[i+3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    t += speed;
    requestAnimationFrame(draw);
  }
  draw();
}

makeWave('c1', 40, 0.008, 6);   // subtle
makeWave('c2', 100, 0.014, 8);  // medium
makeWave('c3', 200, 0.020, 10); // bold
</script>

</body>
</html>
